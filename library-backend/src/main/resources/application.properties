# Название нашего приложения
spring.application.name=library-core

# Настройка подключения к PostgreSQL (Реляционная БД для пользователей)
spring.datasource.url=jdbc:postgresql://localhost:5432/library_db
spring.datasource.username=lib_user
spring.datasource.password=LibPassword123!
spring.datasource.driver-class-name=org.postgresql.Driver

# Настройки Hibernate/JPA
# update автоматический создает таблицы в БД на основе наших Java-классов @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Настройка подключения к ElasticSearch (Поисковый движок для книг)
spring.elasticsearch.uris=http://localhost:9200

# Настройки логирования (чтобы в консоли видеть, если что-то пойдет не так)
logging.level.org.springframework.data.elasticsearch=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# CORS: разрешённый источник фронтенда (используется в WebConfig)
app.cors.allowed-origin=http://localhost:5173

# Стартовая учётная запись библиотекаря (создаётся при запуске, если её ещё нет).
# Пароль сохраняется в виде BCrypt-хеша автоматически — ручная вставка в БД не нужна.
# В продакшене: смените пароль и/или отключите (app.admin.enabled=false).
app.admin.enabled=true
app.admin.email=librarian@gmail.com
app.admin.password=654321
app.admin.name=Librarian

# Загрузка демонстрационного каталога книг в Elasticsearch при пустом индексе
app.books.seed-enabled=true